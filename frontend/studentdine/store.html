<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Food • Student Dine Portal</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .store-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1800px;
      margin: 0 auto;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .filter-card {
      background: var(--card);
      border: 1px solid color-mix(in srgb, var(--txt) 12%, transparent);
      border-radius: 18px;
      padding: 20px;
    }

    .filter-card h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 16px;
      font-weight: 700;
    }

    .filter-option {
      margin-bottom: 12px;
    }

    .filter-option label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--txt);
    }

    .filter-option input[type='checkbox'],
    .filter-option input[type='radio'] {
      cursor: pointer;
    }

    .search-container {
      background: var(--card);
      border: 1px solid color-mix(in srgb, var(--txt) 12%, transparent);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-box input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, var(--txt) 12%, transparent);
      border-radius: 12px;
      background: transparent;
      color: var(--txt);
      font-size: 14px;
      outline: none;
    }

    .search-box input::placeholder {
      color: color-mix(in srgb, var(--txt) 30%, transparent);
    }

    .search-box button {
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--pri), var(--pri-2));
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .search-box button:hover {
      transform: translateY(-2px);
    }

    .main-content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-strip h2 {
      margin: 0;
      font-size: 24px;
    }

    .sort-by {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .sort-by select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--txt) 12%, transparent);
      background: transparent;
      color: var(--txt);
      font-weight: 600;
      cursor: pointer;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .menu-card {
      background: var(--card);
      border: 1px solid color-mix(in srgb, var(--txt) 12%, transparent);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .menu-card-image {
      display: none;
    }

    .menu-card-body {
      padding: 15px;
    }

    .menu-card-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .menu-card-restaurant {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .menu-card-description {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      min-height: 24px;
    }

    .menu-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .menu-card-price {
      font-weight: 800;
      font-size: 14px;
    }

    .menu-card-rating {
      font-size: 12px;
      color: var(--accent);
    }

    .add-to-cart-btn {
      padding: 8px 12px;
      background: linear-gradient(135deg, var(--pri), var(--pri-2));
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .add-to-cart-btn:hover {
      transform: scale(1.05);
    }

    .quantity-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid color-mix(in srgb, var(--pri) 30%, transparent);
      border-radius: 8px;
      padding: 4px;
    }

    .quantity-selector button {
      background: none;
      border: none;
      color: var(--pri);
      cursor: pointer;
      font-weight: 700;
      width: 20px;
      height: 20px;
      padding: 0;
    }

    .quantity-selector span {
      min-width: 20px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .empty-state-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .empty-state-text {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .cart-badge {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, var(--pri), var(--pri-2));
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
    }

    .cart-badge:hover {
      transform: scale(1.1);
    }

    @media (max-width: 1024px) {
      .store-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        top: 0;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
    }

    @media (max-width: 640px) {
      .store-container {
        padding: 15px;
      }

      .sidebar {
        grid-template-columns: 1fr;
      }

      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      .cart-badge {
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav">
    <div class="row">
      <div class="brand">
        <div class="logo"></div>
        <div>Student Dine Portal</div>
      </div>
      <div class="menu">
        <button id="modeToggle">☀️/🌙</button>
        <a href="order-history.html">📜 Orders</a>
        <a href="checkout.html">🛒 Cart</a>
        <button onclick="Auth.logout()">🚪 Logout</button>
      </div>
    </div>
  </nav>

  <div style="padding-top: 20px; max-width: 1800px; margin: 0 auto">
    <!-- Welcome Banner -->
    <div
      style="
        background: linear-gradient(135deg, color-mix(in srgb, var(--pri) 20%, transparent), color-mix(in srgb, var(--pri-2) 20%, transparent));
        border-radius: 18px;
        padding: 30px;
        margin-bottom: 30px;
        border: 1px solid color-mix(in srgb, var(--txt) 12%, transparent);
      "
    >
      <h1 style="margin-top: 0; margin-bottom: 5px">Welcome Back! 👋</h1>
      <p style="color: var(--muted); margin: 0" id="walletDisplay">Wallet: ₹500</p>
    </div>

    <div class="store-container">
      <!-- Sidebar Filters -->
      <div class="sidebar">
        <!-- Search -->
        <div class="search-container">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Search food..."
              autocomplete="off"
            />
            <button onclick="performSearch()">🔍</button>
          </div>
        </div>

        <!-- Filters -->
        <div class="filter-card">
          <h3>🥗 Type</h3>
          <div class="filter-option">
            <label>
              <input type="radio" name="type" value="all" checked onchange="applyFilters()" />
              All items
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input
                type="radio"
                name="type"
                value="veg"
                onchange="applyFilters()"
              />
              Vegetarian
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input
                type="radio"
                name="type"
                value="non-veg"
                onchange="applyFilters()"
              />
              Non-Vegetarian
            </label>
          </div>
        </div>

        <div class="filter-card">
          <h3>🏷️ Category</h3>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="all" onchange="this.form?.reset(); applyFilters()" />
              All
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="starter" onchange="applyFilters()" />
              Starters
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="main" onchange="applyFilters()" />
              Main Course
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="drinks" onchange="applyFilters()" />
              Drinks
            </label>
          </div>
        </div>

        <div class="filter-card">
          <h3>💰 Price Range</h3>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="under-100" onchange="applyFilters()" />
              Under ₹100
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="100-250" onchange="applyFilters()" />
              ₹100 - ₹250
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="250-500" onchange="applyFilters()" />
              ₹250 - ₹500
            </label>
          </div>
          <div class="filter-option">
            <label>
              <input type="checkbox" value="above-500" onchange="applyFilters()" />
              Above ₹500
            </label>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Header -->
        <div class="header-strip">
          <h2 id="contentTitle">🍽️ All Items</h2>
          <div class="sort-by">
            <label>Sort by:</label>
            <select id="sortBy" onchange="applyFilters()">
              <option value="popular">Popular</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="rating">Rating</option>
            </select>
          </div>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid" id="menuGrid"></div>
      </div>
    </div>
  </div>

  <!-- Cart Badge -->
  <div class="cart-badge" onclick="window.location.href='checkout.html'" id="cartBadge">
    <div style="text-align: center">
      <div style="font-size: 12px">🛒</div>
      <div id="cartCount">0</div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="cart.js"></script>
  <script>
    // Check authentication
    if (!Auth.isAuthenticated()) {
      window.location.href = 'auth/login.html';
    }

    let allMenuItems = [];
    let filteredItems = [];

    // Update wallet display
    function updateWalletDisplay() {
      const user = Auth.getCurrentUser();
      document.getElementById('walletDisplay').innerText = `Wallet: ₹${user.wallet}`;
    }

    // Update cart badge
    function updateCartBadge() {
      document.getElementById('cartCount').innerText = Cart.getTotalItems();
    }

    // Search
    function performSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) {
        CampusFoodDB.getMenu({ search: query }).then(items => { filteredItems = items; renderMenu(); }); return;
        document.getElementById('contentTitle').innerText = `🔍 Search Results for "${query}"`;
      } else {
        filteredItems = [...allMenuItems];
        document.getElementById('contentTitle').innerText = '🍽️ All Items';
      }
      renderMenu();
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        performSearch();
      }
    });

    // Apply filters
    function applyFilters() {
      const selectedType = document.querySelector('input[name="type"]:checked').value;
      const selectedCategories = Array.from(
        document.querySelectorAll('input[value="starter"], input[value="main"], input[value="drinks"]')
      )
        .filter(cb => cb.checked)
        .map(cb => cb.value);
      const selectedPrices = Array.from(document.querySelectorAll('input[value*="-"], input[value="under-100"], input[value="above-500"]'))
        .filter(cb => cb.checked)
        .map(cb => cb.value);

      filteredItems = allMenuItems.filter(item => {
        // Type filter
        if (selectedType !== 'all' && item.type !== selectedType) return false;

        // Category filter
        if (selectedCategories.length > 0 && !selectedCategories.includes(item.category)) return false;

        // Price filter
        if (selectedPrices.length > 0) {
          let priceMatch = false;
          selectedPrices.forEach(range => {
            if (range === 'under-100' && item.price < 100) priceMatch = true;
            if (range === '100-250' && item.price >= 100 && item.price <= 250) priceMatch = true;
            if (range === '250-500' && item.price > 250 && item.price <= 500) priceMatch = true;
            if (range === 'above-500' && item.price > 500) priceMatch = true;
          });
          if (!priceMatch) return false;
        }

        return true;
      });

      // Sort
      const sortBy = document.getElementById('sortBy').value;
      if (sortBy === 'price-low') {
        filteredItems.sort((a, b) => a.price - b.price);
      } else if (sortBy === 'price-high') {
        filteredItems.sort((a, b) => b.price - a.price);
      } else if (sortBy === 'rating') {
        filteredItems.sort((a, b) => b.rating - a.rating);
      }

      renderMenu();
    }

    // Render menu
    function renderMenu() {
      const grid = document.getElementById('menuGrid');

      if (filteredItems.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-title">No items found</div>
            <p class="empty-state-text">Try different filters or search terms</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = filteredItems
        .map(item => {
          const cartItem = Cart.items.find(ci => ci.id === item.id);
          const quantity = cartItem ? cartItem.quantity : 0;

          return `
            <div class="menu-card">
              <div class="menu-card-body">
                <div class="menu-card-name">${item.name}</div>
                <div class="menu-card-restaurant">${item.restaurantName}</div>
                <div class="menu-card-description">${item.description}</div>
                <div class="menu-card-footer">
                  <div>
                    <div class="menu-card-price">₹${item.price}</div>
                    <div class="menu-card-rating">★ ${item.rating}</div>
                  </div>
                  <div>
                    ${quantity > 0
                      ? `
                        <div class="quantity-selector">
                          <button onclick="updateItemQuantity(${item.id}, ${quantity - 1})">−</button>
                          <span>${quantity}</span>
                          <button onclick="updateItemQuantity(${item.id}, ${quantity + 1})">+</button>
                        </div>
                      `
                      : `<button class="add-to-cart-btn" onclick="addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')})">Add</button>`}
                  </div>
                </div>
              </div>
            </div>
          `;
        })
        .join('');
    }

    // Add to cart
    function addToCart(item) {
      Cart.addItem(item, 1);
      updateCartBadge();
      renderMenu();
      alert('✅ Item added to cart!');
    }

    // Update item quantity
    function updateItemQuantity(itemId, newQuantity) {
      if (newQuantity <= 0) {
        Cart.removeItem(itemId);
      } else {
        Cart.updateQuantity(itemId, newQuantity);
      }
      updateCartBadge();
      renderMenu();
    }

    // Theme toggle
    const modeToggle = document.getElementById('modeToggle');
    const theme = localStorage.getItem('campus_food_theme') || 'light';
    if (theme === 'light') {
      document.documentElement.classList.add('light');
    }
    modeToggle.innerText = theme === 'light' ? '☀️' : '🌙';

    modeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('light');
      const newTheme = document.documentElement.classList.contains('light') ? 'light' : 'dark';
      localStorage.setItem('campus_food_theme', newTheme);
      modeToggle.innerText = newTheme === 'light' ? '☀️' : '🌙';
    });

    // Initialize
    updateWalletDisplay();
    updateCartBadge();
    CampusFoodDB.getMenu().then(items => { allMenuItems = items; filteredItems = [...items]; renderMenu(); });
  </script>
</body>
</html>
