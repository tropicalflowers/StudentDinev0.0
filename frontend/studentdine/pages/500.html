<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error • Student Dine Portal</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .error-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .error-box {
      background: linear-gradient(135deg, color-mix(in srgb, #dc2626 15%, transparent), color-mix(in srgb, #7c3aed 10%, transparent));
      border: 2px solid #dc2626;
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .error-code {
      font-size: 120px;
      font-weight: 900;
      background: linear-gradient(135deg, #dc2626, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1;
    }

    .error-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 15px;
      color: var(--txt);
    }

    .error-message {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .error-icon {
      font-size: 60px;
      margin-bottom: 20px;
      animation: shake 0.5s infinite;
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-5px);
      }
      75% {
        transform: translateX(5px);
      }
    }

    .error-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 0;
    }

    .error-btn {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .error-btn-primary {
      background: linear-gradient(135deg, var(--pri), var(--pri-2));
      color: white;
    }

    .error-btn-primary:hover {
      transform: translateY(-2px);
    }

    .error-btn-secondary {
      background: color-mix(in srgb, var(--pri) 15%, transparent);
      color: var(--pri);
      border: 2px solid var(--pri);
    }

    .error-btn-secondary:hover {
      background: color-mix(in srgb, var(--pri) 25%, transparent);
    }

    @media (max-width: 768px) {
      .error-box {
        padding: 40px 30px;
      }

      .error-code {
        font-size: 80px;
      }

      .error-title {
        font-size: 24px;
      }

      .error-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="row">
      <div class="brand">
        <div class="logo"></div>
        <div>Student Dine Portal</div>
      </div>
      <div class="menu">
        <button id="modeToggle">☀️/🌙</button>
      </div>
    </div>
  </nav>

  <div class="error-container">
    <div class="error-box">
      <div class="error-icon">⚠️</div>
      <div class="error-code">500</div>
      <div class="error-title">Server Error</div>
      <p class="error-message">
        Something went wrong on our end. Our kitchen team is working to fix it. Please try again in a few moments!
      </p>

      <div class="error-actions">
        <a href="../index.html" class="error-btn error-btn-primary">🏠 Home</a>
        <button class="error-btn error-btn-secondary" onclick="location.reload()">🔄 Retry</button>
      </div>
    </div>
  </div>

  <script>
    const modeToggle = document.getElementById('modeToggle');
    const theme = localStorage.getItem('campus_food_theme') || 'light';
    if (theme === 'light') {
      document.documentElement.classList.add('light');
    }
    modeToggle.innerText = theme === 'light' ? '☀️' : '🌙';

    modeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('light');
      const newTheme = document.documentElement.classList.contains('light') ? 'light' : 'dark';
      localStorage.setItem('campus_food_theme', newTheme);
      modeToggle.innerText = newTheme === 'light' ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
